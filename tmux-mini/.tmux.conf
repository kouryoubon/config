# ---- basic settings ----
set -g default-shell /opt/homebrew/bin/fish
setw -g mode-keys vi
set -sa terminal-overrides ",xterm*:Tc"
set -g default-terminal "xterm-256color"

set -g focus-events on
set -g mouse on
set -g history-limit 10000
set -g set-clipboard on

set -ga update-environment TERM
set -ga update-environment TERM_PROGRAM

# ---- prefix ----
unbind C-b
set -g prefix `
bind-key ` send-prefix
set -s escape-time 10
set -sg repeat-time 0

# ---- window / pane indexing ----
set -g base-index 1
set -g pane-base-index 1
set-window-option -g pane-base-index 1
set-option -g renumber-window on

# ---- keybindings ----
bind n new-window
bind-key ` last-window
bind c copy-mode

# vi copy mode
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind -T copy-mode-vi y send-keys -X copy-selection-and-cancel
bind -T copy-mode-vi Y send-keys -X copy-end-of-line

# split panes
bind \\ split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# reload config
bind r source-file ~/.config/tmux-mini/.tmux.conf \; display "Config reloaded"

# ---- status bar (no theme, minimal) ----
set -g status-position top
set -g status-left " #S "
set -g status-right " #H | %Y-%m-%d %H:%M "
set -g status-style "fg=white,bg=black"
set -g status-left-style "fg=black,bg=green"
set -g status-right-style "fg=white,bg=black"
set -g window-status-current-style "fg=black,bg=white,bright"
set -g message-style "fg=white,bg=black"
